<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    svg: { fontCache: 'global' }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --heading: #061b31;
    --body: #64748d;
    --label: #273951;
    --primary: #533afd;
    --primary-hover: #4434d4;
    --primary-soft: rgba(83, 58, 253, 0.05);
    --primary-light: #b9b9f9;
    --border: #e5edf5;
    --border-soft-purple: #d6d9fc;
    --brand-dark: #1c1e54;
    --success: #15be53;
    --success-text: #108c3d;
    --success-bg: rgba(21, 190, 83, 0.12);
    --success-border: rgba(21, 190, 83, 0.4);
    --ruby: #ea2261;
    --ruby-bg: rgba(234, 34, 97, 0.08);
    --ruby-border: rgba(234, 34, 97, 0.3);
    --shadow-ambient: rgba(23, 23, 23, 0.06) 0px 3px 6px;
    --shadow-standard: rgba(23, 23, 23, 0.08) 0px 15px 35px 0px;
    --shadow-elevated: rgba(50, 50, 93, 0.25) 0px 30px 45px -30px, rgba(0, 0, 0, 0.1) 0px 18px 36px -18px;
  }
  * { box-sizing: border-box; }
  html { font-feature-settings: "ss01"; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    font-weight: 300;
    color: var(--heading);
    background: var(--bg);
    margin: 0;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .home-link {
    color: var(--primary);
    text-decoration: none;
    background: transparent;
    border: 1px solid var(--primary-light);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 400;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  header .home-link:hover { background: var(--primary-soft); }
  header .title-block h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 400;
    color: var(--heading);
    letter-spacing: -0.1px;
  }
  header .title-block .meta {
    font-size: 12px;
    color: var(--body);
    margin-top: 2px;
  }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 24px 120px;
  }

  /* ────── Selector / Start Screen ────── */
  .selector h2 {
    font-size: 12px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
    margin: 24px 0 12px;
  }
  .test-grid { display: grid; gap: 12px; margin-bottom: 32px; }
  .test-btn {
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 22px 24px;
    cursor: pointer;
    transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    font-family: inherit;
    color: var(--heading);
    box-shadow: var(--shadow-ambient);
    width: 100%;
  }
  .test-btn:hover {
    box-shadow: var(--shadow-elevated);
    transform: translateY(-2px);
    border-color: var(--border-soft-purple);
  }
  .test-btn .eyebrow {
    font-size: 12px;
    font-weight: 500;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .test-btn h3 {
    margin: 0 0 6px;
    font-size: 20px;
    font-weight: 300;
    color: var(--heading);
    letter-spacing: -0.2px;
    line-height: 1.15;
  }
  .test-btn p {
    margin: 0;
    font-size: 14px;
    font-weight: 300;
    color: var(--body);
  }
  .free-practice {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 22px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-ambient);
  }
  .free-practice h3 {
    margin: 0 0 14px;
    font-size: 12px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .free-practice .row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .free-practice label {
    font-size: 13px;
    color: var(--label);
    font-weight: 400;
  }
  .free-practice select,
  .free-practice input[type="number"] {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--heading);
    background: white;
  }
  .free-practice select:focus,
  .free-practice input[type="number"]:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }

  /* ────── Quiz / Card View ────── */
  .timer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--body);
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .timer-bar strong {
    color: var(--heading);
    font-weight: 500;
  }

  .progress-bar {
    background: var(--border);
    border-radius: 999px;
    height: 4px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .progress-fill {
    background: var(--primary);
    height: 100%;
    transition: width 0.3s ease;
  }
  .progress-text {
    text-align: center;
    color: var(--body);
    font-size: 13px;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .step-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
    margin-bottom: 18px;
  }
  .step {
    width: 30px;
    height: 30px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: white;
    color: var(--body);
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.12s ease;
    line-height: 1;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .step:hover {
    border-color: var(--primary);
    color: var(--primary);
  }
  .step.current {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }
  .step.correct {
    border-color: var(--success-border);
    background: var(--success-bg);
    color: var(--success-text);
  }
  .step.correct.current {
    background: var(--success);
    color: white;
    border-color: var(--success);
  }
  .step.incorrect {
    border-color: var(--ruby-border);
    background: var(--ruby-bg);
    color: var(--ruby);
  }
  .step.incorrect.current {
    background: var(--ruby);
    color: white;
    border-color: var(--ruby);
  }
  .step.skipped {
    background: #f4f5f7;
    color: var(--body);
  }
  .step.skipped.current {
    background: var(--label);
    color: white;
    border-color: var(--label);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    box-shadow: var(--shadow-elevated);
    margin-bottom: 16px;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--body);
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .chip {
    background: var(--primary-soft);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border-soft-purple);
    font-weight: 500;
  }
  .card-meta .qid {
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
    color: var(--body);
    font-weight: 400;
  }
  .question-text {
    font-size: 17px;
    font-weight: 300;
    color: var(--heading);
    margin-bottom: 24px;
    line-height: 1.55;
  }
  .choices { display: grid; gap: 8px; }
  .choice {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.12s ease, background 0.12s ease;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 15px;
    font-weight: 300;
    color: var(--heading);
  }
  .choice:hover:not(.disabled) {
    border-color: var(--primary);
    background: var(--primary-soft);
  }
  .choice .letter {
    font-weight: 500;
    color: var(--primary);
    min-width: 22px;
    font-feature-settings: "tnum";
  }
  .choice .text { flex: 1; }
  .choice.disabled { cursor: default; }
  .choice.correct {
    background: var(--success-bg);
    border-color: var(--success-border);
  }
  .choice.correct .letter { color: var(--success-text); }
  .choice.incorrect {
    background: var(--ruby-bg);
    border-color: var(--ruby-border);
  }
  .choice.incorrect .letter { color: var(--ruby); }

  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 300;
    color: var(--heading);
    border: 1px solid var(--border);
    background: var(--primary-soft);
    border-left: 3px solid var(--primary);
  }
  .feedback.correct {
    background: var(--success-bg);
    border-color: var(--success-border);
    border-left-color: var(--success);
  }
  .feedback.incorrect {
    background: var(--ruby-bg);
    border-color: var(--ruby-border);
    border-left-color: var(--ruby);
  }
  .feedback.skipped {
    background: #f4f5f7;
    border-left-color: var(--body);
  }
  .feedback .label {
    display: block;
    font-weight: 500;
    margin-bottom: 6px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .feedback.correct .label { color: var(--success-text); }
  .feedback.incorrect .label { color: var(--ruby); }
  .feedback.skipped .label { color: var(--body); }

  .controls {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .controls-row { display: flex; gap: 8px; }

  .fixed-controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    z-index: 50;
    box-shadow: 0 -4px 12px rgba(50, 50, 93, 0.06);
  }
  .fixed-controls .inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
    align-items: center;
  }
  .fixed-controls .controls-row { display: flex; gap: 8px; }
  @supports not (backdrop-filter: blur(12px)) {
    .fixed-controls { background: #ffffff; }
  }
  button {
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
    font-family: inherit;
    line-height: 1;
  }
  button.primary {
    background: var(--primary);
    color: white;
  }
  button.primary:hover:not(:disabled) { background: var(--primary-hover); }
  button.secondary {
    background: white;
    color: var(--primary);
    border: 1px solid var(--primary-light);
  }
  button.secondary:hover:not(:disabled) { background: var(--primary-soft); }
  button.tertiary {
    background: transparent;
    color: var(--body);
    border: 1px solid var(--border);
  }
  button.tertiary:hover:not(:disabled) {
    border-color: var(--label);
    color: var(--heading);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ────── Summary ────── */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 40px;
    box-shadow: var(--shadow-elevated);
    text-align: center;
  }
  .summary h2 {
    margin: 0 0 16px;
    color: var(--heading);
    font-size: 24px;
    font-weight: 300;
    letter-spacing: -0.24px;
  }
  .score {
    font-size: 56px;
    font-weight: 300;
    color: var(--primary);
    margin: 16px 0;
    letter-spacing: -1.4px;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .score-detail {
    color: var(--body);
    font-size: 14px;
    font-weight: 300;
  }
  .topic-breakdown {
    text-align: left;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .topic-breakdown h3 {
    font-size: 12px;
    color: var(--label);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
    margin: 0 0 12px;
  }
  .topic-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-size: 14px;
    font-weight: 300;
    color: var(--heading);
    border-bottom: 1px solid var(--border);
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }
  .topic-row:last-child { border-bottom: none; }

  footer {
    color: var(--body);
    font-size: 13px;
    font-weight: 300;
    text-align: center;
    padding: 32px 16px 48px;
    border-top: 1px solid var(--border);
    margin-top: 48px;
  }
</style>
</head>

<body>
<header>
  <a class="home-link" href="../" title="Back to all decks">← Home</a>
  <div class="title-block">
    <h1 id="page-title">Practice Cards</h1>
    <div class="meta" id="page-meta"></div>
  </div>
</header>

<main>
  <div class="selector" id="selector">
    <h2>Full-Curriculum Tests</h2>
    <div class="test-grid" id="test-grid"></div>

    <h2>Free Practice</h2>
    <div class="free-practice">
      <h3>Customize your session</h3>
      <div class="row">
        <label for="num-questions">Number of cards</label>
        <input type="number" id="num-questions" min="5" max="100" value="15">
        <label for="filter-section" id="filter-label">Section</label>
        <select id="filter-section">
          <option value="all">All</option>
        </select>
        <button class="primary" id="start-btn">Start</button>
      </div>
    </div>
  </div>

  <div id="quiz-area" style="display:none;">
    <div class="timer-bar" id="timer-bar">
      <span><strong>Started</strong> <span id="timer-start">—</span></span>
      <span><strong>Elapsed</strong> <span id="timer-elapsed">0:00</span></span>
    </div>
    <div class="progress-text" id="progress-text"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="step-nav" id="step-nav"></div>
    <div id="card-container"></div>
  </div>

  <div id="summary-area" style="display:none;"></div>
</main>

<div id="fixed-controls" class="fixed-controls" style="display:none;">
  <div class="inner">
    <button class="tertiary" type="button" id="prev-btn">← Prev</button>
    <div class="controls-row">
      <button class="secondary" type="button" id="skip-btn">Skip</button>
      <button class="primary" type="button" id="next-btn">Next →</button>
    </div>
  </div>
</div>

<footer>
  iWork Math &amp; Science Academy · 원장 이상열
</footer>

<script>
'use strict';

let allQuestions = [];
let questionsById = {};
let metaInfo = {};
let categoryConfig = { label: 'Section', short: 'Sec', categories: [] };
let presetTests = [];
let currentSession = null;
let timerInterval = null;

function formatTime(date) {
  const pad = (n) => String(n).padStart(2, '0');
  return pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds());
}

function formatElapsed(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  const pad = (n) => String(n).padStart(2, '0');
  return h > 0 ? (h + ':' + pad(m) + ':' + pad(s)) : (m + ':' + pad(s));
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('timer-start').textContent = formatTime(currentSession.startedAt);
  const tick = () => {
    if (!currentSession || currentSession.endedAt) return;
    const elapsed = Date.now() - currentSession.startedAt.getTime();
    document.getElementById('timer-elapsed').textContent = formatElapsed(elapsed);
  };
  tick();
  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

async function loadQuestions() {
  const res = await fetch('questions.json');
  const data = await res.json();
  allQuestions = data.questions;
  questionsById = Object.fromEntries(allQuestions.map(q => [q.id, q]));
  metaInfo = data;
  presetTests = Array.isArray(data.tests) ? data.tests : [];

  document.getElementById('page-title').textContent = data.title;
  document.title = data.title;
  const metaParts = [data.subject, data.exam_date ? 'Exam ' + data.exam_date : null, 'Instructor ' + data.instructor];
  document.getElementById('page-meta').textContent = metaParts.filter(Boolean).join(' · ');

  if (data.ui) {
    if (data.ui.category_label) categoryConfig.label = data.ui.category_label;
    if (data.ui.category_short) categoryConfig.short = data.ui.category_short;
    if (Array.isArray(data.ui.categories)) categoryConfig.categories = data.ui.categories;
  }

  renderTestGrid();

  document.getElementById('filter-label').textContent = categoryConfig.label;
  const sel = document.getElementById('filter-section');
  for (const cat of categoryConfig.categories) {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.label;
    sel.appendChild(opt);
  }
}

function renderTestGrid() {
  const grid = document.getElementById('test-grid');
  grid.innerHTML = '';
  if (presetTests.length === 0) {
    grid.innerHTML = '<p style="color:var(--body); font-size:13px;">(No preset tests configured.)</p>';
    return;
  }
  presetTests.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'test-btn';
    btn.type = 'button';
    btn.innerHTML =
      '<div class="eyebrow">Test 0' + (i + 1) + '</div>' +
      '<h3>' + t.name + '</h3>' +
      '<p>' + (t.description || (t.question_ids.length + ' questions')) + '</p>';
    btn.addEventListener('click', () => startPresetTest(t));
    grid.appendChild(btn);
  });
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQuestionCategory(q) {
  return q.section || q.chapter || '';
}

function startPresetTest(test) {
  const questions = test.question_ids.map(id => questionsById[id]).filter(Boolean);
  if (questions.length === 0) {
    alert('This test has no valid questions.');
    return;
  }
  currentSession = {
    questions,
    answers: new Array(questions.length).fill(null),
    index: 0,
    label: test.name,
    startedAt: new Date(),
    endedAt: null,
  };
  showQuiz();
}

function startFreePractice() {
  const filter = document.getElementById('filter-section').value;
  const num = parseInt(document.getElementById('num-questions').value, 10);
  let pool = allQuestions;
  if (filter !== 'all') {
    pool = allQuestions.filter(q => getQuestionCategory(q) === filter);
  }
  if (pool.length === 0) {
    alert('No questions match the selected filter.');
    return;
  }
  const questions = shuffle(pool).slice(0, Math.min(num, pool.length));
  currentSession = {
    questions,
    answers: new Array(questions.length).fill(null),
    index: 0,
    label: 'Free Practice',
    startedAt: new Date(),
    endedAt: null,
  };
  showQuiz();
}

function showQuiz() {
  document.getElementById('selector').style.display = 'none';
  document.getElementById('summary-area').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('fixed-controls').style.display = 'block';
  // Wire fixed-bar buttons (do this once they're visible)
  document.getElementById('prev-btn').onclick = goPrev;
  document.getElementById('skip-btn').onclick = skipCard;
  document.getElementById('next-btn').onclick = goNext;
  startTimer();
  renderCard();
}

function renderStepNav() {
  const s = currentSession;
  const nav = document.getElementById('step-nav');
  nav.innerHTML = '';
  s.questions.forEach((q, i) => {
    const ans = s.answers[i];
    const btn = document.createElement('button');
    btn.className = 'step';
    btn.type = 'button';
    btn.textContent = (i + 1);
    btn.title = 'Card ' + (i + 1) + ' (' + q.id + ')';
    if (i === s.index) btn.classList.add('current');
    if (ans) {
      if (ans.picked === null) btn.classList.add('skipped');
      else if (ans.correct) btn.classList.add('correct');
      else btn.classList.add('incorrect');
    }
    btn.addEventListener('click', () => {
      s.index = i;
      renderCard();
    });
    nav.appendChild(btn);
  });
}

function renderCard() {
  const s = currentSession;
  const q = s.questions[s.index];
  const cat = getQuestionCategory(q);
  const total = s.questions.length;
  const existing = s.answers[s.index];

  document.getElementById('progress-text').textContent =
    s.label + ' · Card ' + (s.index + 1) + ' of ' + total;
  document.getElementById('progress-fill').style.width =
    (((s.index + 1) / total) * 100) + '%';
  renderStepNav();

  const container = document.getElementById('card-container');
  container.innerHTML =
    '<div class="card">' +
      '<div class="card-meta">' +
        '<span class="chip">' + categoryConfig.short + ' ' + cat + ' · ' + q.topic + '</span>' +
        '<span class="qid">' + q.id + '</span>' +
      '</div>' +
      '<div class="question-text">' + q.question + '</div>' +
      '<div class="choices" id="choices-list"></div>' +
      '<div id="feedback-area"></div>' +
    '</div>';

  // Update fixed bottom controls (Prev/Skip/Next)
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.disabled = (s.index === 0);
  nextBtn.textContent = (s.index + 1 === total ? 'Finish' : 'Next →');

  const choicesList = document.getElementById('choices-list');
  for (const letter of ['A', 'B', 'C', 'D']) {
    if (!(letter in q.choices)) continue;
    const div = document.createElement('div');
    div.className = 'choice';
    div.dataset.letter = letter;
    div.innerHTML = '<span class="letter">' + letter + '.</span><span class="text">' + q.choices[letter] + '</span>';
    if (existing) {
      div.classList.add('disabled');
      if (letter === q.answer) div.classList.add('correct');
      else if (existing.picked && letter === existing.picked) div.classList.add('incorrect');
    } else {
      div.addEventListener('click', () => pickAnswer(letter));
    }
    choicesList.appendChild(div);
  }

  if (existing) {
    const fb = document.getElementById('feedback-area');
    let cls = 'skipped', label = 'Skipped';
    if (existing.picked) {
      cls = existing.correct ? 'correct' : 'incorrect';
      label = existing.correct ? 'Correct' : 'Incorrect';
    }
    fb.innerHTML =
      '<div class="feedback ' + cls + '">' +
        '<span class="label">' + label + ' · Answer ' + q.answer + '</span>' +
        '<div>' + q.explanation + '</div>' +
      '</div>';
  }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(err => console.warn(err));
  }
}

function pickAnswer(letter) {
  const s = currentSession;
  const q = s.questions[s.index];
  const correct = (letter === q.answer);
  s.answers[s.index] = { picked: letter, correct };

  document.querySelectorAll('.choice').forEach(c => {
    c.classList.add('disabled');
    c.replaceWith(c.cloneNode(true));
  });
  document.querySelectorAll('.choice').forEach(c => {
    const cl = c.dataset.letter;
    if (cl === q.answer) c.classList.add('correct');
    else if (cl === letter) c.classList.add('incorrect');
  });

  const fb = document.getElementById('feedback-area');
  fb.innerHTML =
    '<div class="feedback ' + (correct ? 'correct' : 'incorrect') + '">' +
      '<span class="label">' + (correct ? 'Correct' : 'Incorrect') + ' · Answer ' + q.answer + '</span>' +
      '<div>' + q.explanation + '</div>' +
    '</div>';

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([fb]).catch(err => console.warn(err));
  }
  renderStepNav();
}

function skipCard() {
  const s = currentSession;
  if (s.answers[s.index] === null) {
    s.answers[s.index] = { picked: null, correct: false };
  }
  goNext();
}

function goNext() {
  const s = currentSession;
  if (s.index + 1 >= s.questions.length) {
    showSummary();
  } else {
    s.index++;
    renderCard();
  }
}

function goPrev() {
  const s = currentSession;
  if (s.index > 0) {
    s.index--;
    renderCard();
  }
}

function showSummary() {
  const s = currentSession;
  s.endedAt = new Date();
  stopTimer();
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('fixed-controls').style.display = 'none';

  const total = s.questions.length;
  const correctCount = s.answers.filter(a => a && a.correct).length;
  const skipped = s.answers.filter(a => a === null || a.picked === null).length;
  const wrong = total - correctCount - skipped;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  const totalElapsed = formatElapsed(s.endedAt.getTime() - s.startedAt.getTime());

  const stats = {};
  s.answers.forEach((a, i) => {
    const q = s.questions[i];
    const cat = getQuestionCategory(q);
    if (!stats[cat]) stats[cat] = { right: 0, total: 0 };
    stats[cat].total++;
    if (a && a.correct) stats[cat].right++;
  });

  let breakdownHTML = '<div class="topic-breakdown"><h3>By ' + categoryConfig.label + '</h3>';
  Object.keys(stats).sort().forEach(cat => {
    const x = stats[cat];
    breakdownHTML += '<div class="topic-row"><span>' + categoryConfig.short + ' ' + cat + '</span><span>' + x.right + ' / ' + x.total + '</span></div>';
  });
  breakdownHTML += '</div>';

  const summary = document.getElementById('summary-area');
  summary.innerHTML =
    '<div class="summary">' +
      '<h2>Session Complete · ' + s.label + '</h2>' +
      '<div class="score">' + correctCount + ' / ' + total + '</div>' +
      '<div class="score-detail">' + pct + '% correct · ' + wrong + ' missed · ' + skipped + ' skipped</div>' +
      '<div class="topic-breakdown">' +
        '<h3>Time</h3>' +
        '<div class="topic-row"><span>Started</span><span>' + formatTime(s.startedAt) + '</span></div>' +
        '<div class="topic-row"><span>Ended</span><span>' + formatTime(s.endedAt) + '</span></div>' +
        '<div class="topic-row"><span>Total elapsed</span><span>' + totalElapsed + '</span></div>' +
      '</div>' +
      breakdownHTML +
      '<div class="controls" style="justify-content:center; margin-top:28px;">' +
        '<button class="primary" onclick="location.reload()">Home — Test Selection</button>' +
      '</div>' +
    '</div>';
  summary.style.display = 'block';
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadQuestions();
  document.getElementById('start-btn').addEventListener('click', startFreePractice);
});
</script>
</body>
</html>
