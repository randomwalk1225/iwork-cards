<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Cards</title>

<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    svg: { fontCache: 'global' }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  :root {
    --bg: #f7f8fa;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --muted: #5f6368;
    --primary: #1565c0;
    --primary-light: #e3f2fd;
    --primary-dark: #0d47a1;
    --correct: #2e7d32;
    --correct-light: #e8f5e9;
    --incorrect: #c62828;
    --incorrect-light: #ffebee;
    --border: #e0e0e0;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
    line-height: 1.6;
  }
  header {
    background: var(--primary);
    color: white;
    padding: 14px 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header .home-link {
    color: white;
    text-decoration: none;
    background: rgba(255,255,255,0.18);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  header .home-link:hover { background: rgba(255,255,255,0.32); }
  header .title-block h1 { margin: 0; font-size: 17px; font-weight: 600; }
  header .title-block .meta { font-size: 12px; opacity: 0.9; margin-top: 2px; }
  main {
    max-width: 760px;
    margin: 24px auto;
    padding: 0 16px;
  }
  .selector h2 {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 18px 4px 10px;
  }
  .test-grid {
    display: grid;
    gap: 12px;
    margin-bottom: 24px;
  }
  .test-btn {
    text-align: left;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-left: 5px solid var(--primary);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
    color: var(--text);
  }
  .test-btn:hover {
    border-color: var(--primary);
    background: var(--primary-light);
    transform: translateY(-1px);
  }
  .test-btn h3 {
    margin: 0 0 4px;
    font-size: 16px;
    color: var(--primary);
    font-weight: 600;
  }
  .test-btn p { margin: 0; font-size: 13px; color: var(--muted); }
  .free-practice {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .free-practice h3 { margin: 0 0 12px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .free-practice .row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .free-practice label { font-size: 13px; color: var(--muted); }
  .free-practice select, .free-practice input[type="number"] {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 9px;
    font-size: 13px;
    font-family: inherit;
  }

  .progress-bar {
    background: var(--border);
    border-radius: 999px;
    height: 6px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-fill {
    background: var(--primary);
    height: 100%;
    transition: width 0.3s ease;
  }
  .step-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .step {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.12s ease;
    line-height: 1;
  }
  .step:hover { transform: scale(1.1); border-color: var(--primary); color: var(--primary); }
  .step.current {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
    box-shadow: 0 0 0 3px var(--primary-light);
  }
  .step.correct {
    border-color: var(--correct);
    background: var(--correct-light);
    color: var(--correct);
  }
  .step.correct.current {
    background: var(--correct);
    color: white;
    box-shadow: 0 0 0 3px var(--correct-light);
  }
  .step.incorrect {
    border-color: var(--incorrect);
    background: var(--incorrect-light);
    color: var(--incorrect);
  }
  .step.incorrect.current {
    background: var(--incorrect);
    color: white;
    box-shadow: 0 0 0 3px var(--incorrect-light);
  }
  .step.skipped {
    background: #f0f0f0;
    color: var(--muted);
    border-color: #ddd;
  }
  .step.skipped.current {
    background: var(--muted);
    color: white;
  }
  .progress-text {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .timer-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .timer-bar strong { color: var(--text); font-weight: 600; }
  .card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .chip {
    background: var(--primary-light);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 600;
  }
  .question-text {
    font-size: 17px;
    margin-bottom: 22px;
    line-height: 1.7;
  }
  .choices { display: grid; gap: 10px; }
  .choice {
    background: #fafbfc;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 15px;
  }
  .choice:hover:not(.disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .choice .letter {
    font-weight: 700;
    color: var(--primary);
    min-width: 22px;
  }
  .choice .text { flex: 1; }
  .choice.disabled { cursor: default; }
  .choice.correct {
    background: var(--correct-light);
    border-color: var(--correct);
  }
  .choice.correct .letter { color: var(--correct); }
  .choice.incorrect {
    background: var(--incorrect-light);
    border-color: var(--incorrect);
  }
  .choice.incorrect .letter { color: var(--incorrect); }
  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 8px;
    background: var(--primary-light);
    border-left: 4px solid var(--primary);
    font-size: 15px;
  }
  .feedback.correct { background: var(--correct-light); border-left-color: var(--correct); }
  .feedback.incorrect { background: var(--incorrect-light); border-left-color: var(--incorrect); }
  .feedback.skipped { background: #f5f5f5; border-left-color: var(--muted); }
  .feedback .label { font-weight: 700; margin-bottom: 6px; display: block; }

  .controls {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .controls-row { display: flex; gap: 8px; }
  button {
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  button.primary { background: var(--primary); color: white; }
  button.primary:hover:not(:disabled) { background: var(--primary-dark); }
  button.secondary {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
  }
  button.secondary:hover:not(:disabled) { background: var(--primary-light); }
  button.tertiary {
    background: white;
    color: var(--muted);
    border: 2px solid var(--border);
  }
  button.tertiary:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .summary {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 32px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .summary h2 { margin: 0 0 12px; color: var(--primary); }
  .score {
    font-size: 48px;
    font-weight: 700;
    color: var(--primary);
    margin: 16px 0;
  }
  .score-detail { color: var(--muted); font-size: 14px; }
  .topic-breakdown {
    text-align: left;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .topic-breakdown h3 {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 12px;
  }
  .topic-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px dashed var(--border);
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 16px;
    margin-top: 24px;
  }
</style>
</head>

<body>
<header>
  <a class="home-link" href="../" title="Back to all decks">← Home</a>
  <div class="title-block">
    <h1 id="page-title">Practice Cards</h1>
    <div class="meta" id="page-meta"></div>
  </div>
</header>

<main>
  <div class="selector" id="selector">
    <h2>Full-Curriculum Tests</h2>
    <div class="test-grid" id="test-grid"></div>

    <h2>Free Practice</h2>
    <div class="free-practice">
      <h3>Customize your session</h3>
      <div class="row">
        <label for="num-questions">Number of cards:</label>
        <input type="number" id="num-questions" min="5" max="100" value="15">
        <label for="filter-section" id="filter-label">Section:</label>
        <select id="filter-section">
          <option value="all">All</option>
        </select>
        <button class="primary" id="start-btn">Start</button>
      </div>
    </div>
  </div>

  <div id="quiz-area" style="display:none;">
    <div class="timer-bar" id="timer-bar">
      <span><strong>Started:</strong> <span id="timer-start">—</span></span>
      <span><strong>Elapsed:</strong> <span id="timer-elapsed">0:00</span></span>
    </div>
    <div class="progress-text" id="progress-text"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="step-nav" id="step-nav"></div>
    <div id="card-container"></div>
  </div>

  <div id="summary-area" style="display:none;"></div>
</main>

<footer>
  iWork Math &amp; Science Academy — 원장 이상열
</footer>

<script>
'use strict';

let allQuestions = [];
let questionsById = {};
let metaInfo = {};
let categoryConfig = { label: 'Section', short: 'Sec', categories: [] };
let presetTests = [];
let currentSession = null;
let timerInterval = null;

function formatTime(date) {
  const pad = (n) => String(n).padStart(2, '0');
  return pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds());
}

function formatElapsed(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  const pad = (n) => String(n).padStart(2, '0');
  return h > 0 ? (h + ':' + pad(m) + ':' + pad(s)) : (m + ':' + pad(s));
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('timer-start').textContent = formatTime(currentSession.startedAt);
  const tick = () => {
    if (!currentSession || currentSession.endedAt) return;
    const elapsed = Date.now() - currentSession.startedAt.getTime();
    document.getElementById('timer-elapsed').textContent = formatElapsed(elapsed);
  };
  tick();
  timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

async function loadQuestions() {
  const res = await fetch('questions.json');
  const data = await res.json();
  allQuestions = data.questions;
  questionsById = Object.fromEntries(allQuestions.map(q => [q.id, q]));
  metaInfo = data;
  presetTests = Array.isArray(data.tests) ? data.tests : [];

  document.getElementById('page-title').textContent = data.title;
  document.title = data.title;
  const metaParts = [data.subject, data.exam_date ? 'Exam: ' + data.exam_date : null, 'Instructor: ' + data.instructor];
  document.getElementById('page-meta').textContent = metaParts.filter(Boolean).join(' · ');

  if (data.ui) {
    if (data.ui.category_label) categoryConfig.label = data.ui.category_label;
    if (data.ui.category_short) categoryConfig.short = data.ui.category_short;
    if (Array.isArray(data.ui.categories)) categoryConfig.categories = data.ui.categories;
    if (data.ui.theme_color) document.documentElement.style.setProperty('--primary', data.ui.theme_color);
    if (data.ui.theme_light) document.documentElement.style.setProperty('--primary-light', data.ui.theme_light);
  }

  renderTestGrid();

  document.getElementById('filter-label').textContent = categoryConfig.label + ':';
  const sel = document.getElementById('filter-section');
  for (const cat of categoryConfig.categories) {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.label;
    sel.appendChild(opt);
  }
}

function renderTestGrid() {
  const grid = document.getElementById('test-grid');
  grid.innerHTML = '';
  if (presetTests.length === 0) {
    grid.innerHTML = '<p style="color:var(--muted); font-size:13px; padding:8px;">(No preset tests configured.)</p>';
    return;
  }
  for (const t of presetTests) {
    const btn = document.createElement('button');
    btn.className = 'test-btn';
    btn.innerHTML =
      '<h3>' + t.name + '</h3>' +
      '<p>' + (t.description || (t.question_ids.length + ' questions')) + '</p>';
    btn.addEventListener('click', () => startPresetTest(t));
    grid.appendChild(btn);
  }
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQuestionCategory(q) {
  return q.section || q.chapter || '';
}

function startPresetTest(test) {
  const questions = test.question_ids.map(id => questionsById[id]).filter(Boolean);
  if (questions.length === 0) {
    alert('This test has no valid questions.');
    return;
  }
  currentSession = {
    questions,
    answers: new Array(questions.length).fill(null),
    index: 0,
    label: test.name,
    startedAt: new Date(),
    endedAt: null,
  };
  showQuiz();
}

function startFreePractice() {
  const filter = document.getElementById('filter-section').value;
  const num = parseInt(document.getElementById('num-questions').value, 10);
  let pool = allQuestions;
  if (filter !== 'all') {
    pool = allQuestions.filter(q => getQuestionCategory(q) === filter);
  }
  if (pool.length === 0) {
    alert('No questions match the selected filter.');
    return;
  }
  const questions = shuffle(pool).slice(0, Math.min(num, pool.length));
  currentSession = {
    questions,
    answers: new Array(questions.length).fill(null),
    index: 0,
    label: 'Free Practice',
    startedAt: new Date(),
    endedAt: null,
  };
  showQuiz();
}

function showQuiz() {
  document.getElementById('selector').style.display = 'none';
  document.getElementById('summary-area').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  startTimer();
  renderCard();
}

function renderStepNav() {
  const s = currentSession;
  const nav = document.getElementById('step-nav');
  nav.innerHTML = '';
  s.questions.forEach((q, i) => {
    const ans = s.answers[i];
    const btn = document.createElement('button');
    btn.className = 'step';
    btn.type = 'button';
    btn.textContent = (i + 1);
    btn.title = 'Card ' + (i + 1) + ' (' + q.id + ')';
    if (i === s.index) btn.classList.add('current');
    if (ans) {
      if (ans.picked === null) btn.classList.add('skipped');
      else if (ans.correct) btn.classList.add('correct');
      else btn.classList.add('incorrect');
    }
    btn.addEventListener('click', () => {
      s.index = i;
      renderCard();
    });
    nav.appendChild(btn);
  });
}

function renderCard() {
  const s = currentSession;
  const q = s.questions[s.index];
  const cat = getQuestionCategory(q);
  const total = s.questions.length;
  const existing = s.answers[s.index];

  document.getElementById('progress-text').textContent =
    s.label + ' · Card ' + (s.index + 1) + ' of ' + total;
  document.getElementById('progress-fill').style.width =
    (((s.index + 1) / total) * 100) + '%';
  renderStepNav();

  const container = document.getElementById('card-container');
  container.innerHTML =
    '<div class="card">' +
      '<div class="card-meta">' +
        '<span class="chip">' + categoryConfig.short + ' ' + cat + ' · ' + q.topic + '</span>' +
        '<span>' + q.id + '</span>' +
      '</div>' +
      '<div class="question-text">' + q.question + '</div>' +
      '<div class="choices" id="choices-list"></div>' +
      '<div id="feedback-area"></div>' +
      '<div class="controls">' +
        '<button class="tertiary" id="prev-btn"' + (s.index === 0 ? ' disabled' : '') + '>← Prev</button>' +
        '<div class="controls-row">' +
          '<button class="secondary" id="skip-btn">Skip</button>' +
          '<button class="primary" id="next-btn">' + (s.index + 1 === total ? 'Finish' : 'Next →') + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  const choicesList = document.getElementById('choices-list');
  for (const letter of ['A', 'B', 'C', 'D']) {
    if (!(letter in q.choices)) continue;
    const div = document.createElement('div');
    div.className = 'choice';
    div.dataset.letter = letter;
    div.innerHTML = '<span class="letter">' + letter + '.</span><span class="text">' + q.choices[letter] + '</span>';
    if (existing) {
      div.classList.add('disabled');
      if (letter === q.answer) div.classList.add('correct');
      else if (existing.picked && letter === existing.picked) div.classList.add('incorrect');
    } else {
      div.addEventListener('click', () => pickAnswer(letter));
    }
    choicesList.appendChild(div);
  }

  if (existing) {
    const fb = document.getElementById('feedback-area');
    let cls = 'skipped', label = '○ Skipped';
    if (existing.picked) {
      cls = existing.correct ? 'correct' : 'incorrect';
      label = existing.correct ? '✓ Correct' : '✗ Incorrect';
    }
    fb.innerHTML =
      '<div class="feedback ' + cls + '">' +
        '<span class="label">' + label + ' — Answer: ' + q.answer + '</span>' +
        '<div>' + q.explanation + '</div>' +
      '</div>';
  }

  document.getElementById('prev-btn').addEventListener('click', () => goPrev());
  document.getElementById('skip-btn').addEventListener('click', () => skipCard());
  document.getElementById('next-btn').addEventListener('click', () => goNext());

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(err => console.warn(err));
  }
}

function pickAnswer(letter) {
  const s = currentSession;
  const q = s.questions[s.index];
  const correct = (letter === q.answer);
  s.answers[s.index] = { picked: letter, correct };

  document.querySelectorAll('.choice').forEach(c => {
    c.classList.add('disabled');
    c.replaceWith(c.cloneNode(true));
  });
  document.querySelectorAll('.choice').forEach(c => {
    const cl = c.dataset.letter;
    if (cl === q.answer) c.classList.add('correct');
    else if (cl === letter) c.classList.add('incorrect');
  });

  const fb = document.getElementById('feedback-area');
  fb.innerHTML =
    '<div class="feedback ' + (correct ? 'correct' : 'incorrect') + '">' +
      '<span class="label">' + (correct ? '✓ Correct' : '✗ Incorrect') + ' — Answer: ' + q.answer + '</span>' +
      '<div>' + q.explanation + '</div>' +
    '</div>';

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([fb]).catch(err => console.warn(err));
  }
}

function skipCard() {
  const s = currentSession;
  if (s.answers[s.index] === null) {
    s.answers[s.index] = { picked: null, correct: false };
  }
  goNext();
}

function goNext() {
  const s = currentSession;
  if (s.index + 1 >= s.questions.length) {
    showSummary();
  } else {
    s.index++;
    renderCard();
  }
}

function goPrev() {
  const s = currentSession;
  if (s.index > 0) {
    s.index--;
    renderCard();
  }
}

function showSummary() {
  const s = currentSession;
  s.endedAt = new Date();
  stopTimer();
  document.getElementById('quiz-area').style.display = 'none';

  const total = s.questions.length;
  const correctCount = s.answers.filter(a => a && a.correct).length;
  const skipped = s.answers.filter(a => a === null || a.picked === null).length;
  const wrong = total - correctCount - skipped;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  const totalElapsed = formatElapsed(s.endedAt.getTime() - s.startedAt.getTime());

  const stats = {};
  s.answers.forEach((a, i) => {
    const q = s.questions[i];
    const cat = getQuestionCategory(q);
    if (!stats[cat]) stats[cat] = { right: 0, total: 0 };
    stats[cat].total++;
    if (a && a.correct) stats[cat].right++;
  });

  let breakdownHTML = '<div class="topic-breakdown"><h3>By ' + categoryConfig.label + '</h3>';
  Object.keys(stats).sort().forEach(cat => {
    const x = stats[cat];
    breakdownHTML += '<div class="topic-row"><span>' + categoryConfig.short + ' ' + cat + '</span><span>' + x.right + ' / ' + x.total + '</span></div>';
  });
  breakdownHTML += '</div>';

  const summary = document.getElementById('summary-area');
  summary.innerHTML =
    '<div class="summary">' +
      '<h2>Session Complete — ' + s.label + '</h2>' +
      '<div class="score">' + correctCount + ' / ' + total + '</div>' +
      '<div class="score-detail">' + pct + '% correct · ' + wrong + ' missed · ' + skipped + ' skipped</div>' +
      '<div class="topic-breakdown">' +
        '<h3>Time</h3>' +
        '<div class="topic-row"><span>Started</span><span>' + formatTime(s.startedAt) + '</span></div>' +
        '<div class="topic-row"><span>Ended</span><span>' + formatTime(s.endedAt) + '</span></div>' +
        '<div class="topic-row"><span>Total elapsed</span><span>' + totalElapsed + '</span></div>' +
      '</div>' +
      breakdownHTML +
      '<div class="controls" style="justify-content:center; margin-top:24px;">' +
        '<button class="primary" onclick="location.reload()">🏠 Home — Test Selection</button>' +
      '</div>' +
    '</div>';
  summary.style.display = 'block';
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadQuestions();
  document.getElementById('start-btn').addEventListener('click', startFreePractice);
});
</script>
</body>
</html>
